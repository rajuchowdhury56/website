<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Workaround for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when some library tries to polyfill fetch globally in a read-only environment.
      (function() {
        if (typeof window !== 'undefined' && window.fetch) {
          try {
            const originalFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              get() { return originalFetch; },
              set() { /* Swallow assignment to prevent TypeError */ },
              configurable: true,
              enumerable: true
            });
          } catch (e) {
            console.warn('Could not define window.fetch setter:', e);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
